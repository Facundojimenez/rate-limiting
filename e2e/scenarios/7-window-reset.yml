config:
  target: "{{ $env.TARGET }}"
  plugins:
    expect: {}
  processor: "../processor.js"
  phases:
    - name: "window-reset-test"
      # La duración debe ser mayor que la espera del window (10s) + tiempo de ejecución
      duration: 30
      arrivalCount: 1

scenarios:
  # Caso: La ventana de rate limit se resetea una vez que expira el tiempo configurado
  # Flujo:
  #   1. Agotar el límite de POST (POST_MAX=3 requests → 201, luego → 429)
  #   2. Esperar que el window expire (think: 12s > WINDOW_SECONDS=10s)
  #   3. Verificar que el mismo userId puede hacer requests nuevamente → 201
  - name: "El límite se resetea después del window"
    flow:
      # --- Paso 1: Agotar el límite ---
      - function: "initPostRateLimitTest"
      - loop:
          - function: "incrementRequestCount"
          - post:
              url: "/rate-limited-payments"
              qs:
                userId: "{{ rateLimitUserId }}"
              json:
                amount: 999
                currency: "USD"
              afterResponse: "validatePostRateLimitResponse"
        count: 5  # POST_MAX=3 → requests 1-3 son 201, requests 4-5 son 429

      # --- Paso 2: Esperar el reset del window ---
      # WINDOW_SECONDS=10 en docker-compose.e2e.yml → esperamos 12s por seguridad
      - think: 12

      # --- Paso 3: Verificar que el límite se reseteó ---
      # Después del reset, el mismo userId debe poder hacer requests nuevamente
      - post:
          url: "/rate-limited-payments"
          qs:
            userId: "{{ rateLimitUserId }}"
          json:
            amount: 100
            currency: "USD"
          expect:
            - statusCode: 201  # Debe ser 201 (no 429) porque el window se reseteó
