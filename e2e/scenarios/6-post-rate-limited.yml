config:
  target: "{{ $env.TARGET }}"
  plugins:
    expect: {}
  processor: "../processor.js"
  phases:
    - name: "post-rate-limited"
      duration: 15
      arrivalCount: 1  # Un único VU ejecuta el flujo completo de forma secuencial

scenarios:
  # Caso: POST excede el límite de rate → los primeros POST_MAX requests son 201, los siguientes son 429
  # Con POST_MAX=3 en e2e: requests 1-3 → 201, requests 4-5 → 429
  - name: "POST excede el límite → 429 Too Many Requests"
    flow:
      # Inicializa userId único y contador para este test
      - function: "initPostRateLimitTest"
      # Loop: 5 requests al mismo userId
      # Los primeros 3 deben retornar 201, los últimos 2 deben retornar 429
      - loop:
          - function: "incrementRequestCount"
          - post:
              url: "/rate-limited-payments"
              qs:
                userId: "{{ rateLimitUserId }}"
              json:
                amount: 500
                currency: "USD"
              afterResponse: "validatePostRateLimitResponse"
        count: 5
