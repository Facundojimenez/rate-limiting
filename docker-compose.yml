services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    environment:
      - PORT=${BACKEND_PORT:-3000}
      - NODE_ENV=development
    volumes:
      - ./packages/backend/src:/app/src
      - ./packages/backend/tsconfig.json:/app/tsconfig.json
    command: npm run dev:watch
    restart: unless-stopped

  rate-limiter:
    build:
      context: ./packages/rate-limiter
      dockerfile: Dockerfile
    container_name: rate-limiter
    ports:
      - "${RATE_LIMITER_PORT:-4000}:${RATE_LIMITER_PORT:-4000}"
    environment:
      - PORT=${RATE_LIMITER_PORT:-4000}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - BACKEND_URL=http://backend:${BACKEND_PORT:-3000}
      - INSERT_MAX_REQUESTS=${INSERT_MAX_REQUESTS:-5}
      - INSERT_WINDOW_SECONDS=${INSERT_WINDOW_SECONDS:-60}
      - GET_MAX_REQUESTS=${GET_MAX_REQUESTS:-10}
      - GET_WINDOW_SECONDS=${GET_WINDOW_SECONDS:-60}
    volumes:
      - ./packages/rate-limiter/src:/app/src
      - ./packages/rate-limiter/tsconfig.json:/app/tsconfig.json
    command: npm run dev:watch
    depends_on:
      - redis
      - backend
    restart: unless-stopped
